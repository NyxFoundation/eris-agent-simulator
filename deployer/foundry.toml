[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
evm_version = "paris"

# Since foundry discovers and compiles every .sol in the project, exclude externally
# managed Solidity (vendor/gmx-src assumes hardhat+via-ir; node_modules holds each
# protocol's artifacts). Only the shared mocks in contracts/ and MockOracleProvider
# are compiled here.
skip = ["vendor/**", "**/node_modules/**", "node_modules/**"]

# Foundry is used only to compile the shared mock tokens (WETH9 / MockERC20).
# Each protocol itself is deployed from the TypeScript + viem code under src/.
