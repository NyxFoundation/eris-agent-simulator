# config/regimes/calm-01.yaml — official regime: calm (normal market with no stress). ADR 0016 §2
#
# regime = this file (market conditions) + seed. Defines the OU fair price / flow intensity / stress.
# Run: npm run backtest -- --regime calm-01 [--agents <roster>] [--repeat N]
#
# Note (ADR 0016 §3):
#   - blockTimeSec is part of the regime (fixed to the production value). Shortening is an explicit
#     override for behavior checks and smoke tests only; runs whose scores you read must use this default.
#   - The published regime's seed is one sample from the range. The production run's seed is a different sample (anti-overfitting).
# The roster is the default for pre-submission verification. Replaceable via --agents <roster.yaml|json>.

run:
  seed: 101
  blocks: 60
  seconds: 600 # end by block count (set well above blocks x blockTimeSec)
  blockTimeSec: 2 # fixed to the regime (ADR 0016 §2)
  protocols: [uniswap, balancer, curve, gmx, aave]
  economicGas: false
  localDeploy: true # backtest runs on a local anvil loaded with the distributed state
  reportDir: ./runs

funding:
  wethWei: "0" # USDC-only distribution (removes initial directional exposure)
  usdcUnits: "25000000000"

limits:
  agentWethWei: "1000000000000000000"
  agentUsdcUnits: "5000000000"

flow:
  uninformedMaxWethWei: "1000000000000000000"
  informedMaxWethWei: "2000000000000000000"
  balancerMaxWethWei: "1000000000000000000"
  curveMaxWethWei: "1000000000000000000"
  # Realistic flow (fee-aware informed + Poisson/lognormal. same calibration values as config/example.yaml)
  informedArbFeeBps: 30
  uninformedArrivalRate: "0.9"
  uninformedSizeSigma: "1.0"
  gmxArrivalRate: "0.75"
  gmxSizeSigma: "1.0"
  aaveActorSizeSigma: "1.0"

agents:
  - id: noop
    wallet: AGENT1_PRIVATE_KEY
    baseline: true
    description: does nothing (baseline)
  - id: venue-arb
    wallet: AGENT2_PRIVATE_KEY
    description: WETH-only cross-venue arbitrage
  - id: multi-arb
    wallet: AGENT3_PRIVATE_KEY
    description: base-agnostic cross-venue arbitrage (all active bases x all venues)
