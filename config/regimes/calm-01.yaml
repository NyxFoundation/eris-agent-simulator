# config/regimes/calm-01.yaml — 公式 regime: calm（ストレス無しの平常市場）。ADR 0016 §2
#
# regime = このファイル（市場条件）+ seed。OU fair price / flow 強度 / stress を定義する。
# 実行: npm run backtest -- --regime calm-01 [--agents <roster>] [--repeat N]
#
# 注意（ADR 0016 §3）:
#   - blockTimeSec は regime の一部（本番と同値に固定）。短縮は挙動確認・スモーク専用の明示
#     override とし、成績を読む run はこの既定値で回すこと。
#   - 公開 regime の seed はレンジからのサンプル 1 例。本番 run の seed は別サンプル（過学習対策）。
# ロスターは提出前検証用の既定。--agents <roster.yaml|json> で差し替えられる。

run:
  seed: 101
  blocks: 60
  seconds: 600 # 終了はブロック数で揃える（blocks×blockTimeSec より十分大きく取る）
  blockTimeSec: 2 # regime に固定（ADR 0016 §2）
  protocols: [uniswap, balancer, curve, gmx, aave]
  economicGas: false
  localDeploy: true # backtest は配布 state をロードしたローカル anvil 上で走る
  reportDir: ./runs

funding:
  wethWei: "0" # USDC-only 配布（初期の方向性エクスポージャを排除）
  usdcUnits: "25000000000"

limits:
  agentWethWei: "1000000000000000000"
  agentUsdcUnits: "5000000000"

flow:
  uninformedMaxWethWei: "1000000000000000000"
  informedMaxWethWei: "2000000000000000000"
  balancerMaxWethWei: "1000000000000000000"
  curveMaxWethWei: "1000000000000000000"
  # 現実的フロー（fee-aware informed + Poisson/lognormal。config/example.yaml と同じ較正値）
  informedArbFeeBps: 30
  uninformedArrivalRate: "0.9"
  uninformedSizeSigma: "1.0"
  gmxArrivalRate: "0.75"
  gmxSizeSigma: "1.0"
  aaveActorSizeSigma: "1.0"

agents:
  - id: noop
    wallet: AGENT1_PRIVATE_KEY
    baseline: true
    description: 何もしない (基準ライン)
  - id: venue-arb
    wallet: AGENT2_PRIVATE_KEY
    description: WETH 専用 cross-venue 裁定
  - id: multi-arb
    wallet: AGENT3_PRIVATE_KEY
    description: base 非依存 cross-venue 裁定（全 active base × 全 venue）
