# config/regimes/crash-01.yaml — official regime: crash (trapezoidal crash + Aave liquidation opportunities). ADR 0016 §2
#
# On top of the same market conditions as calm-01, overlays a seed-randomized crash (ADR 0009) and
# a group of liquidation-target victims (excluded from scoring). The liquidator agent receives the
# victim addresses via ERIS_LIQUIDATION_VICTIMS.
# Run: npm run backtest -- --regime crash-01 [--agents <roster>] [--repeat N]
#
# Calibration coupling (ADR 0009 §4 / CLAUDE.md):
#   - Condition to open victims: HF0 >= LT/(0.97*LTV) (verified on-chain against measured reserve values, fail-fast)
#   - Condition to breach HF: crash magnitude m > (HF0-1)/HF0. For HF0=1.10, m > 9.1% ->
#     magnitudeRange [0.12, 0.16] breaches reliably even at the lower bound
# blockTimeSec is part of the regime (ADR 0016 §3). Runs whose scores you read must use this default.

run:
  seed: 202
  blocks: 60
  seconds: 600 # a stress run auto-disables the time limit and ends by block count (ADR 0009)
  blockTimeSec: 2 # fixed to the regime (ADR 0016 §2)
  protocols: [uniswap, balancer, curve, gmx, aave]
  economicGas: false
  localDeploy: true
  reportDir: ./runs

funding:
  wethWei: "0" # USDC-only distribution (removes initial directional exposure)
  usdcUnits: "25000000000"

limits:
  agentWethWei: "1000000000000000000"
  agentUsdcUnits: "5000000000"

flow:
  uninformedMaxWethWei: "1000000000000000000"
  informedMaxWethWei: "2000000000000000000"
  balancerMaxWethWei: "1000000000000000000"
  curveMaxWethWei: "1000000000000000000"
  informedArbFeeBps: 30
  uninformedArrivalRate: "0.9"
  uninformedSizeSigma: "1.0"
  gmxArrivalRate: "0.75"
  gmxSizeSigma: "1.0"
  aaveActorSizeSigma: "1.0"

stress:
  # Give ranges, not values (the seed samples them) = suppresses overfitting to a specific path (ADR 0009)
  events:
    - {
        type: crash,
        magnitudeRange: [0.12, 0.16],
        windowFrac: [0.3, 0.7],
        rampBlocks: 3,
        holdBlocks: 6,
        decayBlocks: 8,
      }
  victimCount: 2
  victimHf0: 1.10

agents:
  - id: noop
    wallet: AGENT1_PRIVATE_KEY
    baseline: true
    description: does nothing (baseline)
  - id: venue-arb
    wallet: AGENT2_PRIVATE_KEY
    description: WETH-only cross-venue arbitrage
  - id: multi-arb
    wallet: AGENT3_PRIVATE_KEY
    description: base-agnostic cross-venue arbitrage (all active bases x all venues)
  - id: liquidator
    wallet: AGENT4_PRIVATE_KEY
    description: Aave liquidation bot (receives victim addresses via ERIS_LIQUIDATION_VICTIMS)
