# ADR 0014 verification: vulnerability events (malicious pools) + new-pool discovery + pre-trade verification.
# Assumes local deploy. During the run, N new pools (a mix of honest/rigged) "spring up" from the SEED;
# discovery-arb (naive) jumps at the attractive quote and takes the hit on rigged, while discovery-arb-verify
# (careful) rejects rigged via a pre-trade dry-run + codehash + optional LLM audit and profits from the safe new pools.
#
# Run: npm run sim:realtime -- --config config/vuln-test.yaml
# Analysis: pool_created / vulnerability_disclosed / vulnerability_exploited / safe_pool_captured in
#        runs/<id>/events.jsonl, and opportunity_detected / vulnerability_avoided in runs/<id>/agents/<id>.jsonl.
run:
  seed: 1
  blocks: 30 # window is relative to run length. vuln requires blocks>0 (time limit is auto-disabled)
  seconds: 150
  blockTimeSec: 2
  protocols: [uniswap, balancer, curve]
  localDeploy: true
  reportDir: ./runs

funding:
  wethWei: "0" # USDC-only distribution (removes initial directional exposure)
  usdcUnits: "25000000000" # 25,000 USDC (enough to trade several pools)
  base: { WBTC: "0" }

limits:
  agentWethWei: "1000000000000000000"
  agentUsdcUnits: "5000000000" # per-round 5,000 USDC (rug threshold = frac x this)
  agentBase: { WBTC: "5000000" }

# Vulnerability events (ranges, not values. fixed by SEED -> suppresses overfitting).
vuln:
  poolLiquidityUsdcUnits: "2000000000000" # ~$2M per side of each pool (deep = bait becomes realized profit)
  poolFeeBps: 30 # 0.3% (small enough not to offset the honest pool's bait)
  llm: "mock" # "0"=off / "mock"=static source scan / "1"=real LLM (ollama)
  events:
    - type: rigged-pool
      windowFrac: [0.35, 0.5] # appears at the 35-50% point of the run
      poolCount: [4, 6] # number of new pools spawned simultaneously
      riggedFrac: [0.5, 0.7] # fraction that is rigged (the rest are safe genuine arb)
      baitBps: [300, 600] # shown 3-6% cheaper than fair (the lure)
      rugBps: [3000, 6000] # fraction the rigged pool skims (30-60%)
      rugThresholdFrac: [0.2, 0.4] # skim threshold relative to per-round cap (skims above it)

agents:
  - id: noop
    wallet: AGENT1_PRIVATE_KEY
    baseline: true
    description: does nothing (baseline)
  - id: discovery-arb
    wallet: AGENT2_PRIVATE_KEY
    description: discover + execute immediately (naive. the counterpart that skips verification and takes the hit on rigged)
  - id: discovery-arb-verify
    wallet: AGENT3_PRIVATE_KEY
    description: discover + pre-trade verification (careful. rejects rigged and profits from safe new pools)
