# config/example.yaml
#
# Single source for user simulation settings. Copy to `config/local.yaml` to use:
#   cp config/example.yaml config/local.yaml
#   npm run sim:realtime                              # reads config/local.yaml by default
#   npm run sim:realtime -- --config config/stress.yaml   # specify a different file
#
# Keys are nested (run / funding / limits / flow / stress + agents). Values can be typed (booleans,
# numbers, arrays, objects). Unspecified keys use defaults. One-off overrides via CLI flags (--seed / --blocks / --protocols etc.).
#
# Do not put secrets here (this file may be committed). Put RPC URLs, private keys, and API keys in
# `.env.local` (ARB_RPC_URL / *_PRIVATE_KEY / ANTHROPIC_API_KEY / OLLAMA_API_KEY).
# The local Anvil dev keys are used by default even when unspecified.
#
# LLM-driven by default: the trading agents below run in prompt mode (prompt.md, one LLM call per
# decision; ERIS_AGENT_MODE: "prompt"). This requires an LLM endpoint — set OLLAMA_API_KEY in
# `.env.local` (default: Ollama Cloud, model gpt-oss:120b), or point at a local ollama with
# ERIS_OLLAMA_BASE_URL=http://127.0.0.1:11434/api (no key needed). To run the same strategies
# rule-based (agent.ts, no LLM), remove the `env:` line from each agent. See docs/guide/llm-agents.md.

run:
  seed: 1
  # LLM decisions take ~10s each over Ollama Cloud, so give the run enough blocks/wall-clock for
  # prompt-mode agents to act (rule-based runs are fine with fewer, e.g. 24 blocks / 70s).
  blocks: 100
  seconds: 300
  blockTimeSec: 2
  protocols: [uniswap, balancer, curve]
  economicGas: false
  localDeploy: false
  reportDir: ./runs

funding:
  wethWei: "0" # USDC-only distribution (removes initial directional exposure)
  usdcUnits: "25000000000"
  # base: { WBTC: "0" }   # initial inventory of additional bases (default 0)

limits:
  agentWethWei: "1000000000000000000"
  agentUsdcUnits: "5000000000"
  # agentBase: { WBTC: "0" }   # per-round cap for additional bases

flow:
  uninformedMaxWethWei: "1000000000000000000"
  informedMaxWethWei: "2000000000000000000"
  balancerMaxWethWei: "1000000000000000000"
  curveMaxWethWei: "1000000000000000000"
  # Realistic flow (from ADR 0015 Notes / amm-challenge). The following are defaults and take effect even if omitted.
  #   informedArbFeeBps: makes the environment's arbitrage (informed flow) fee-aware. Closes the
  #     excess only when the gap exceeds the fee band (default 30bps), leaving a residual = fee (does
  #     not fully close to fair every block). 0 for the legacy behavior.
  #   uninformedArrivalRate: makes uninformed flow Poisson-arriving (lambda, default 0.9). 0 reverts to a fixed count.
  #   uninformedSizeSigma: makes uninformed flow size lognormal (sigma, default 1.0. heavy tail = occasional large orders).
  # Note: Poisson/lognormal increase variance, so read run comparisons as aggregates over multiple seeds. Disable with 0.
  informedArbFeeBps: 30
  uninformedArrivalRate: "0.9"
  uninformedSizeSigma: "1.0"
  # Extend the same realistic flow to GMX / Aave (enabled by default. ADR 0015 Notes / amm-challenge).
  #   gmxArrivalRate: makes GMX position count Poisson(lambda) and size lognormal (default 0.75). 0
  #     reverts to the legacy Bernoulli(gmxActivityProb)+uniform burst+uniform size. gmxSizeSigma is the lognormal sigma (default 1.0).
  #   aaveActorSizeSigma: makes each Aave actor's target collateral heterogeneous via lognormal (whale/minnow mix. default 1.0).
  #     borrow tracks each one's 30% LTV of collateral, so HF safety is unchanged. 0 for uniform actors.
  gmxArrivalRate: "0.75"
  gmxSizeSigma: "1.0"
  aaveActorSizeSigma: "1.0"
  # Per-block probability of emitting gmx flow (used only in the legacy gmxArrivalRate=0 mode. 0..1, default 0.5).
  # gmxActivityProb: "0.5"
  # gmxMaxBurst: "2"        # cap on gmx count per firing block in legacy mode (1 = always single)
  # aave borrower pool: aaveActorCount independent actors (distinct addresses, persistent positions). Each actor
  # performs one borrow/repay/collateral/withdraw with probability aaveActivityProb every block, and borrowed debt persists to the next block.
  # The number of simultaneous borrows in one block is at most aaveActorCount (arising naturally from separate actors).
  # aaveActivityProb: "0.5"
  # aaveActorCount: "4"
  # To trade multi-asset (WBTC), enable WBTC flow (creates price divergence = arbitrage opportunities):
  # baseMax: { WBTC: "50000000" }

# stress (market stress events. default off):
# stress:
#   events:
#     - { type: crash, magnitudeRange: [0.12, 0.16], windowFrac: [0.3, 0.7], rampBlocks: 3, holdBlocks: 6, decayBlocks: 8 }
#   victimCount: 0

# agents (roster. replaces the old agents.*.json. written inline)
# Note: account0 overlaps with the deployer, so locally use AGENT1 onward. Each agent's env is a
# strategy parameter passed to that agent's process (distinct from the sim settings).
agents:
  - id: noop
    wallet: AGENT1_PRIVATE_KEY
    baseline: true
    description: does nothing (baseline; rule-based on purpose)
  - id: venue-arb
    wallet: AGENT2_PRIVATE_KEY
    description: WETH-only cross-venue arbitrage (LLM-driven via prompt.md)
    env: { ERIS_AGENT_MODE: "prompt", ERIS_PROMPT_LOG_CALLS: "1" }
  - id: multi-arb
    wallet: AGENT3_PRIVATE_KEY
    description: base-agnostic cross-venue arbitrage (all active bases x all venues; LLM-driven via prompt.md)
    env: { ERIS_AGENT_MODE: "prompt", ERIS_PROMPT_LOG_CALLS: "1" }
